services:
  # NestJS Monolith API on Render
  - type: web
    name: personifier-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build -w apps/api
    startCommand: npm run start:prod -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
